<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aurum — Messages</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --cream:      #F5F0E8;
      --cream-dark: #EDE7D9;
      --ink:        #1A1710;
      --ink-mid:    #2E2B22;
      --gold:       #C9A84C;
      --gold-dim:   rgba(201,168,76,.15);
      --rust:       #B84A2E;
      --warm-gray:  #7A7468;
      --sidebar-w:  230px;
      --sidebar-w-collapsed: 68px;
      --topbar-h:   60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
      transition: width .3s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .sidebar.collapsed { width: var(--sidebar-w-collapsed); }
    .sidebar::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; opacity: .4;
    }
    .sidebar::before {
      content: '';
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,.1);
      bottom: -120px; right: -160px;
      pointer-events: none;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: .75rem;
      padding: 0 1.25rem;
      height: var(--topbar-h);
      border-bottom: 1px solid rgba(255,255,255,.06);
      flex-shrink: 0; white-space: nowrap; overflow: hidden;
      position: relative; z-index: 1; text-decoration: none;
    }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--gold) 0%, #A07B2A 100%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'DM Serif Display', serif; font-size: .95rem;
      color: var(--ink); font-weight: 700;
    }
    .brand-name {
      font-family: 'DM Serif Display', serif; font-size: 1.2rem;
      color: var(--cream); letter-spacing: .04em;
      opacity: 1; transition: opacity .2s;
    }
    .brand-name span { color: var(--gold); }
    .sidebar.collapsed .brand-name { opacity: 0; pointer-events: none; }

    .sidebar-nav {
      flex: 1; padding: 1rem 0;
      overflow-y: auto; overflow-x: hidden;
      position: relative; z-index: 1;
    }
    .sidebar-nav::-webkit-scrollbar { width: 3px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(201,168,76,.3); border-radius: 99px; }

    .nav-section-label {
      font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(245,240,232,.25);
      padding: .75rem 1.4rem .35rem;
      white-space: nowrap; overflow: hidden; transition: opacity .2s;
    }
    .sidebar.collapsed .nav-section-label { opacity: 0; }

    .nav-item-link {
      display: flex; align-items: center; gap: .85rem;
      padding: .62rem 1.25rem; margin: .1rem .6rem;
      border-radius: 8px; cursor: pointer; text-decoration: none;
      color: rgba(245,240,232,.55); font-size: .875rem; font-weight: 400;
      white-space: nowrap; overflow: hidden;
      transition: background .18s, color .18s; position: relative;
    }
    .nav-item-link:hover { background: rgba(245,240,232,.07); color: var(--cream); }
    .nav-item-link.active { background: var(--gold-dim); color: var(--gold); }
    .nav-item-link.active::before {
      content: ''; position: absolute;
      left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--gold); border-radius: 0 3px 3px 0; margin-left: -0.6rem;
    }
    .nav-item-link i { font-size: 1.05rem; flex-shrink: 0; width: 20px; text-align: center; }
    .nav-label { opacity: 1; transition: opacity .18s; }
    .sidebar.collapsed .nav-label { opacity: 0; }

    .nav-badge {
      margin-left: auto; background: var(--rust); color: #fff;
      font-size: .62rem; font-weight: 500; padding: .1rem .42rem;
      border-radius: 99px; flex-shrink: 0; transition: opacity .18s;
    }
    .sidebar.collapsed .nav-badge { opacity: 0; }

    .sidebar-footer {
      padding: .85rem .6rem;
      border-top: 1px solid rgba(255,255,255,.06);
      position: relative; z-index: 1;
    }
    .user-chip {
      display: flex; align-items: center; gap: .75rem;
      padding: .5rem .65rem; border-radius: 8px; cursor: pointer;
      overflow: hidden; white-space: nowrap; transition: background .18s;
    }
    .user-chip:hover { background: rgba(245,240,232,.07); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #8B7355 0%, #C9A84C 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 600; color: var(--ink); flex-shrink: 0;
    }
    .user-info { overflow: hidden; transition: opacity .18s; }
    .sidebar.collapsed .user-info { opacity: 0; }
    .user-name { font-size: .8rem; color: var(--cream); font-weight: 500; }
    .user-role { font-size: .68rem; color: var(--warm-gray); }

    .collapse-btn {
      position: absolute;
      top: calc(var(--topbar-h) / 2); right: -13px;
      transform: translateY(-50%);
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--ink-mid);
      border: 1.5px solid rgba(201,168,76,.3);
      color: var(--gold);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .75rem; z-index: 200;
      transition: background .18s, transform .3s;
    }
    .collapse-btn:hover { background: var(--gold); color: var(--ink); }
    .sidebar.collapsed .collapse-btn { transform: translateY(-50%) rotate(180deg); }

    .sidebar.collapsed .nav-item-link[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(var(--sidebar-w-collapsed) - .6rem); top: 50%;
      transform: translateY(-50%);
      background: var(--ink-mid); color: var(--cream);
      font-size: .78rem; padding: .35rem .75rem; border-radius: 6px;
      white-space: nowrap; border: 1px solid rgba(201,168,76,.2);
      pointer-events: none; z-index: 999;
    }

    /* ══════════════════════════════════════
       MAIN AREA
    ══════════════════════════════════════ */
    .main-area {
      margin-left: var(--sidebar-w);
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      transition: margin-left .3s cubic-bezier(.4,0,.2,1);
    }
    .main-area.expanded { margin-left: var(--sidebar-w-collapsed); }

    .topbar {
      height: var(--topbar-h); background: var(--cream);
      border-bottom: 1px solid #E0D9CE;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; flex-shrink: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .page-breadcrumb { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--warm-gray); }
    .page-breadcrumb span { color: var(--ink); font-weight: 500; }
    .page-breadcrumb i { font-size: .65rem; }
    .topbar-right { display: flex; align-items: center; gap: .75rem; }
    .topbar-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: transparent; border: 1.5px solid #D6CFC3;
      color: var(--warm-gray);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .95rem;
      transition: border-color .18s, color .18s; position: relative;
    }
    .topbar-btn:hover { border-color: var(--ink); color: var(--ink); }
    .topbar-btn .dot {
      position: absolute; top: 6px; right: 6px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--rust); border: 1.5px solid var(--cream);
    }
    .search-bar {
      display: flex; align-items: center; gap: .5rem;
      background: #EDE7D9; border: 1.5px solid transparent;
      border-radius: 8px; padding: .4rem .85rem;
      font-size: .83rem; color: var(--warm-gray);
      transition: border-color .18s, background .18s; width: 200px;
    }
    .search-bar:focus-within { border-color: var(--gold); background: #fff; }
    .search-bar input { background: transparent; border: none; outline: none; font-family: 'DM Sans',sans-serif; font-size: .83rem; color: var(--ink); width: 100%; }
    .search-bar input::placeholder { color: var(--warm-gray); }

    .mobile-menu-btn {
      display: none; width: 36px; height: 36px; border-radius: 8px;
      background: transparent; border: 1.5px solid #D6CFC3;
      color: var(--warm-gray); align-items: center; justify-content: center;
      cursor: pointer; font-size: .95rem;
    }

    /* ══════════════════════════════════════
       MESSAGES LAYOUT
    ══════════════════════════════════════ */
    .messages-shell {
      flex: 1; display: flex; overflow: hidden;
      animation: fadeIn .35s ease both;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

    /* ── Conversation List ── */
    .conv-panel {
      width: 300px;
      flex-shrink: 0;
      border-right: 1px solid #E0D9CE;
      display: flex;
      flex-direction: column;
      background: var(--cream);
    }

    .conv-header {
      padding: 1.25rem 1.25rem .75rem;
      border-bottom: 1px solid #E8E1D5;
      flex-shrink: 0;
    }
    .conv-header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .85rem;
    }
    .conv-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem; color: var(--ink);
    }
    .conv-title em { font-style: italic; color: var(--gold); }
    .new-msg-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--ink); border: none;
      color: var(--gold); display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .85rem;
      transition: background .18s;
    }
    .new-msg-btn:hover { background: var(--ink-mid); }

    .conv-search {
      display: flex; align-items: center; gap: .5rem;
      background: #EDE7D9; border: 1.5px solid transparent;
      border-radius: 8px; padding: .45rem .8rem;
      font-size: .8rem; color: var(--warm-gray);
      transition: border-color .18s, background .18s;
    }
    .conv-search:focus-within { border-color: var(--gold); background: #fff; }
    .conv-search input {
      background: transparent; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: .8rem;
      color: var(--ink); width: 100%;
    }
    .conv-search input::placeholder { color: var(--warm-gray); }

    /* Filter tabs */
    .conv-tabs {
      display: flex; gap: .35rem;
      padding: .65rem 1.25rem;
      border-bottom: 1px solid #E8E1D5;
      flex-shrink: 0;
    }
    .conv-tab {
      font-size: .72rem; padding: .28rem .7rem;
      border-radius: 99px; border: 1.5px solid transparent;
      cursor: pointer; color: var(--warm-gray);
      transition: all .15s; background: transparent;
      font-family: 'DM Sans', sans-serif; letter-spacing: .04em;
    }
    .conv-tab.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .conv-tab:not(.active):hover { border-color: #D6CFC3; color: var(--ink); }

    /* Conversation items */
    .conv-list {
      flex: 1; overflow-y: auto;
      padding: .5rem 0;
    }
    .conv-list::-webkit-scrollbar { width: 3px; }
    .conv-list::-webkit-scrollbar-thumb { background: #D6CFC3; border-radius: 99px; }

    .conv-item {
      display: flex; align-items: flex-start; gap: .85rem;
      padding: .85rem 1.25rem; cursor: pointer;
      transition: background .15s; position: relative;
      border-left: 3px solid transparent;
    }
    .conv-item:hover { background: rgba(201,168,76,.06); }
    .conv-item.active {
      background: var(--gold-dim);
      border-left-color: var(--gold);
    }

    .conv-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 600; color: var(--ink);
      flex-shrink: 0; position: relative;
    }
    .conv-avatar .online-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 9px; height: 9px; border-radius: 50%;
      background: #4A7C59; border: 1.5px solid var(--cream);
    }
    .conv-avatar .online-dot.away { background: var(--gold); }

    .conv-body { flex: 1; min-width: 0; }
    .conv-name-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .2rem;
    }
    .conv-name { font-size: .85rem; font-weight: 500; color: var(--ink); }
    .conv-time { font-size: .7rem; color: var(--warm-gray); }
    .conv-preview {
      font-size: .78rem; color: var(--warm-gray);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-item.unread .conv-preview { color: var(--ink); font-weight: 500; }
    .conv-unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--rust); flex-shrink: 0; margin-top: .35rem;
    }

    /* ── Chat Thread ── */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: #FDFAF4;
    }

    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.75rem;
      height: var(--topbar-h);
      border-bottom: 1px solid #E0D9CE;
      flex-shrink: 0;
      background: var(--cream);
    }
    .chat-header-left { display: flex; align-items: center; gap: .85rem; }
    .chat-thread-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 600; color: var(--ink);
    }
    .chat-thread-name { font-size: .95rem; font-weight: 500; color: var(--ink); }
    .chat-thread-status { font-size: .73rem; color: #4A7C59; }
    .chat-header-actions { display: flex; gap: .5rem; }
    .chat-action-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: transparent; border: 1.5px solid #D6CFC3;
      color: var(--warm-gray);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .9rem;
      transition: border-color .18s, color .18s;
    }
    .chat-action-btn:hover { border-color: var(--ink); color: var(--ink); }

    /* Messages area */
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 1.5rem 1.75rem;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #D6CFC3; border-radius: 99px; }

    /* Date divider */
    .date-divider {
      display: flex; align-items: center; gap: .75rem;
      color: var(--warm-gray); font-size: .72rem;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: #E0D9CE;
    }

    /* Message row */
    .msg-row {
      display: flex; gap: .75rem; align-items: flex-end;
      animation: fadeUp .3s ease both;
    }
    .msg-row.mine { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 600; color: var(--ink);
      flex-shrink: 0; margin-bottom: .1rem;
    }

    .msg-content { max-width: 62%; display: flex; flex-direction: column; gap: .25rem; }
    .msg-row.mine .msg-content { align-items: flex-end; }

    .msg-sender { font-size: .7rem; color: var(--warm-gray); margin-bottom: .1rem; padding: 0 .25rem; }
    .msg-row.mine .msg-sender { text-align: right; }

    .msg-bubble {
      padding: .7rem 1rem;
      border-radius: 16px;
      font-size: .855rem;
      line-height: 1.55;
      color: var(--ink);
      background: #fff;
      border: 1.5px solid #E5DECE;
      border-bottom-left-radius: 4px;
    }
    .msg-row.mine .msg-bubble {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
      border-bottom-right-radius: 4px;
      border-bottom-left-radius: 16px;
    }

    .msg-meta {
      font-size: .68rem; color: var(--warm-gray);
      padding: 0 .25rem;
      display: flex; align-items: center; gap: .3rem;
    }
    .msg-row.mine .msg-meta { flex-direction: row-reverse; }
    .msg-read { color: var(--gold); }

    /* File attachment bubble */
    .msg-file {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .9rem;
      background: #fff; border: 1.5px solid #E5DECE;
      border-radius: 12px; cursor: pointer;
      transition: border-color .15s;
    }
    .msg-file:hover { border-color: var(--gold); }
    .file-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--gold-dim); color: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; flex-shrink: 0;
    }
    .file-info .file-name { font-size: .8rem; font-weight: 500; color: var(--ink); }
    .file-info .file-size { font-size: .7rem; color: var(--warm-gray); }

    /* Typing indicator */
    .typing-indicator {
      display: flex; align-items: center; gap: .75rem;
    }
    .typing-dots {
      display: flex; gap: 4px; align-items: center;
      background: #fff; border: 1.5px solid #E5DECE;
      padding: .65rem .95rem; border-radius: 16px; border-bottom-left-radius: 4px;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--warm-gray); display: block;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Compose bar */
    .compose-bar {
      padding: 1rem 1.75rem 1.25rem;
      border-top: 1px solid #E0D9CE;
      background: var(--cream);
      flex-shrink: 0;
    }
    .compose-box {
      display: flex; align-items: flex-end; gap: .75rem;
      background: #fff; border: 1.5px solid #E0D9CE;
      border-radius: 12px; padding: .65rem .85rem;
      transition: border-color .18s;
    }
    .compose-box:focus-within { border-color: var(--gold); }
    .compose-box textarea {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: .875rem;
      color: var(--ink); resize: none; line-height: 1.5;
      max-height: 100px; min-height: 22px;
    }
    .compose-box textarea::placeholder { color: #B0A899; }
    .compose-actions { display: flex; align-items: center; gap: .4rem; flex-shrink: 0; }
    .compose-btn {
      width: 30px; height: 30px; border-radius: 7px;
      background: transparent; border: none;
      color: var(--warm-gray); cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
    }
    .compose-btn:hover { color: var(--ink); background: var(--cream-dark); }
    .send-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--ink); border: none;
      color: var(--gold); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: background .18s;
    }
    .send-btn:hover { background: var(--ink-mid); }

    /* ── Sidebar overlay ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,23,16,.5); z-index: 99;
    }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .conv-panel { width: 260px; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform .3s, width .3s; width: var(--sidebar-w) !important; }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar-overlay { display: block; opacity: 0; pointer-events: none; transition: opacity .3s; }
      .sidebar.mobile-open ~ .sidebar-overlay { opacity: 1; pointer-events: all; }
      .main-area { margin-left: 0 !important; }
      .collapse-btn { display: none; }
      .mobile-menu-btn { display: flex !important; }
      .search-bar { display: none; }
      .conv-panel { width: 240px; }
      .topbar { padding: 0 1rem; }
    }
    @media (max-width: 560px) {
      .conv-panel { display: none; }
      .conv-panel.show-mobile { display: flex; position: absolute; inset: 0; z-index: 10; width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <button class="collapse-btn" id="collapseBtn"><i class="bi bi-chevron-left"></i></button>
    <a class="sidebar-brand" href="#">
      <div class="brand-icon">A</div>
      <span class="brand-name">Aur<span>•</span>um</span>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item-link" href="#" data-tooltip="Dashboard" data-page="Dashboard">
        <i class="bi bi-grid-1x2"></i><span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Analytics" data-page="Analytics">
        <i class="bi bi-bar-chart-line"></i><span class="nav-label">Analytics</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Projects" data-page="Projects">
        <i class="bi bi-folder2-open"></i><span class="nav-label">Projects</span>
        <span class="nav-badge">4</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Calendar" data-page="Calendar">
        <i class="bi bi-calendar3"></i><span class="nav-label">Calendar</span>
      </a>
      <a class="nav-item-link active" href="#" data-tooltip="Messages" data-page="Messages">
        <i class="bi bi-chat-square-dots"></i><span class="nav-label">Messages</span>

      </a>
      <div class="nav-section-label">Workspace</div>
      <a class="nav-item-link" href="#" data-tooltip="Team" data-page="Team">
        <i class="bi bi-people"></i><span class="nav-label">Team</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Documents" data-page="Documents">
        <i class="bi bi-file-earmark-text"></i><span class="nav-label">Documents</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Reports" data-page="Reports">
        <i class="bi bi-clipboard-data"></i><span class="nav-label">Reports</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Integrations" data-page="Integrations">
        <i class="bi bi-plug"></i><span class="nav-label">Integrations</span>
      </a>
      <div class="nav-section-label">Account</div>
      <a class="nav-item-link" href="#" data-tooltip="Settings" data-page="Settings">
        <i class="bi bi-gear"></i><span class="nav-label">Settings</span>
      </a>
      <a class="nav-item-link" href="#" data-tooltip="Help" data-page="Help">
        <i class="bi bi-question-circle"></i><span class="nav-label">Help &amp; Support</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar">AO</div>
        <div class="user-info">
          <div class="user-name">Amara Osei</div>
          <div class="user-role">Product Lead</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ══ MAIN ══ -->
  <div class="main-area" id="mainArea">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="bi bi-list"></i></button>
        <div class="page-breadcrumb">
          Aurum <i class="bi bi-chevron-right"></i>
          <span>Messages</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-bar">
          <i class="bi bi-search" style="font-size:.8rem;flex-shrink:0;"></i>
          <input type="text" placeholder="Search anything…"/>
          <span style="font-size:.7rem;color:#B0A899;border:1px solid #D6CFC3;border-radius:4px;padding:.05rem .3rem;">⌘K</span>
        </div>
        <button class="topbar-btn"><i class="bi bi-bell"></i><span class="dot"></span></button>
        <button class="topbar-btn"><i class="bi bi-moon"></i></button>
        <div class="user-avatar" style="width:32px;height:32px;font-size:.72rem;cursor:pointer;">AO</div>
      </div>
    </header>

    <!-- Messages Shell -->
    <div class="messages-shell">

      <!-- ── Conversation List ── -->
      <div class="conv-panel" id="convPanel">
        <div class="conv-header">
          <div class="conv-header-top">
            <div class="conv-title">Inbox <em>·</em></div>
            <button class="new-msg-btn" title="New message"><i class="bi bi-pencil-square"></i></button>
          </div>
          <div class="conv-search">
            <i class="bi bi-search" style="font-size:.75rem;flex-shrink:0;"></i>
            <input type="text" placeholder="Search messages…"/>
          </div>
        </div>

        <div class="conv-tabs">
          <button class="conv-tab active">All</button>
          <button class="conv-tab">Unread</button>
          <button class="conv-tab">Groups</button>
        </div>

        <div class="conv-list" id="convList">
          <!-- Items injected by JS -->
        </div>
      </div>

      <!-- ── Chat Thread ── -->
      <div class="chat-panel">
        <div class="chat-header">
          <div class="chat-header-left">
            <div class="chat-thread-avatar" id="chatAvatar" style="background: linear-gradient(135deg,#8B7355,#C9A84C);">KA</div>
            <div>
              <div class="chat-thread-name" id="chatName">Kwame Asante</div>
              <div class="chat-thread-status"><i class="bi bi-circle-fill" style="font-size:.45rem;vertical-align:middle;"></i> Online</div>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="chat-action-btn" title="Voice call"><i class="bi bi-telephone"></i></button>
            <button class="chat-action-btn" title="Video call"><i class="bi bi-camera-video"></i></button>
            <button class="chat-action-btn" title="Search in chat"><i class="bi bi-search"></i></button>
            <button class="chat-action-btn" title="More options"><i class="bi bi-three-dots"></i></button>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- Messages injected by JS -->
        </div>

        <div class="compose-bar">
          <div class="compose-box">
            <textarea id="composeInput" rows="1" placeholder="Write a message…"></textarea>
            <div class="compose-actions">
              <button class="compose-btn" title="Attach file"><i class="bi bi-paperclip"></i></button>
              <button class="compose-btn" title="Emoji"><i class="bi bi-emoji-smile"></i></button>
              <button class="send-btn" id="sendBtn" title="Send"><i class="bi bi-send-fill"></i></button>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /messages-shell -->
  </div><!-- /main-area -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    /* ─── Data ─────────────────────────────────── */
    const avatarColors = [
      'linear-gradient(135deg,#8B7355,#C9A84C)',
      'linear-gradient(135deg,#3C6494,#6A9FD4)',
      'linear-gradient(135deg,#4A7C59,#82C49B)',
      'linear-gradient(135deg,#8B4A3C,#C9714C)',
      'linear-gradient(135deg,#6A4A8B,#A47CC9)',
      'linear-gradient(135deg,#4A6A8B,#7CB4C9)',
    ];

    const conversations = [
      { id:1, name:'Kwame Asante',    initials:'KA', color:0, time:'2m ago',   preview:'I\'ll review the deck tonight and send feedback.',   unread:true,  online:true  },
      { id:2, name:'Nadia Mensah',    initials:'NM', color:1, time:'14m ago',  preview:'The new brand assets look great! Really clean.',      unread:true,  online:true  },
      { id:3, name:'Design Team',     initials:'DT', color:2, time:'1h ago',   preview:'Kofi: Can we push the sprint to next Tuesday?',       unread:true,  online:false, group:true },
      { id:4, name:'Kofi Boateng',    initials:'KB', color:3, time:'3h ago',   preview:'Thanks for the introduction, really appreciated.',   unread:false, online:false },
      { id:5, name:'Efua Darko',      initials:'ED', color:4, time:'Yesterday',preview:'Are the Q3 numbers ready for the board meeting?',     unread:false, online:true, away:true  },
      { id:6, name:'Product Channel', initials:'PC', color:5, time:'Yesterday',preview:'Amara: Let\'s align on roadmap priorities for Q4.',   unread:false, online:false, group:true },
      { id:7, name:'Ama Serwaa',      initials:'AS', color:0, time:'Mon',      preview:'Could you share the final contract version?',         unread:false, online:false },
      { id:8, name:'Dev Sync',        initials:'DS', color:2, time:'Sun',      preview:'Isaac: Staging deploy is live for review.',           unread:false, online:false, group:true },
    ];

    const threads = {
      1: [
        { from:'them', text:'Hey Amara! Do you have a minute to look at the pitch deck before the client call?', time:'9:12 AM' },
        { from:'me',   text:'Of course! Send it over when you\'re ready.', time:'9:14 AM' },
        { from:'them', text:'Just shared it in the drive. Main concern is the pricing slide — I think it needs to be clearer.', time:'9:15 AM' },
        { from:'them', file:true, fileName:'Q4_Pitch_Deck_v3.pdf', fileSize:'2.4 MB', time:'9:15 AM' },
        { from:'me',   text:'Got it. The structure looks solid. I\'d move the pricing table up and add a comparison column. Want me to make a quick revision?', time:'9:20 AM', read:true },
        { from:'them', text:'That would be amazing, thank you! Also — are we still on for the 2pm review?', time:'9:22 AM' },
        { from:'me',   text:'Yes, confirmed. I\'ll have the revised slide ready before then.', time:'9:24 AM', read:true },
        { from:'them', text:'I\'ll review the deck tonight and send feedback.', time:'9:31 AM' },
        { typing: true },
      ],
      2: [
        { from:'them', text:'Hi! Just received the updated brand kit from the design team.', time:'10:05 AM' },
        { from:'me',   text:'Oh great — how does it look?', time:'10:07 AM', read:true },
        { from:'them', text:'The new brand assets look great! Really clean.', time:'10:08 AM' },
      ],
      3: [
        { from:'them', sender:'Kofi', text:'Hey team — quick update on the sprint timeline.', time:'8:50 AM' },
        { from:'them', sender:'Kofi', text:'Can we push the sprint to next Tuesday?', time:'8:51 AM' },
        { from:'me',   text:'I\'m flexible, Tuesday works for me.', time:'8:55 AM', read:true },
      ],
    };

    let activeConv = 1;

    /* ─── Render conversation list ──────────────── */
    function renderConvList() {
      const list = document.getElementById('convList');
      list.innerHTML = conversations.map(c => `
        <div class="conv-item ${c.unread?'unread':''} ${c.id===activeConv?'active':''}" data-id="${c.id}">
          <div class="conv-avatar" style="background:${avatarColors[c.color]}">
            ${c.group ? `<i class="bi bi-people-fill" style="font-size:.85rem;color:var(--ink);"></i>` : c.initials}
            ${c.online && !c.group ? `<span class="online-dot ${c.away?'away':''}"></span>` : ''}
          </div>
          <div class="conv-body">
            <div class="conv-name-row">
              <span class="conv-name">${c.name}</span>
              <span class="conv-time">${c.time}</span>
            </div>
            <div class="conv-preview">${c.preview}</div>
          </div>
          ${c.unread ? '<div class="conv-unread-dot"></div>' : ''}
        </div>
      `).join('');

      list.querySelectorAll('.conv-item').forEach(el => {
        el.addEventListener('click', () => {
          activeConv = +el.dataset.id;
          // Mark as read
          const conv = conversations.find(c => c.id === activeConv);
          if (conv) conv.unread = false;
          renderConvList();
          renderThread(activeConv);
          updateChatHeader(activeConv);
        });
      });
    }

    /* ─── Update chat header ─────────────────────── */
    function updateChatHeader(id) {
      const conv = conversations.find(c => c.id === id);
      if (!conv) return;
      document.getElementById('chatAvatar').style.background = avatarColors[conv.color];
      document.getElementById('chatAvatar').innerHTML = conv.group
        ? `<i class="bi bi-people-fill" style="font-size:.85rem;"></i>` : conv.initials;
      document.getElementById('chatName').textContent = conv.name;
    }

    /* ─── Render thread ──────────────────────────── */
    function renderThread(id) {
      const msgs = threads[id] || [];
      const conv  = conversations.find(c => c.id === id);
      const area  = document.getElementById('chatMessages');

      let html = `<div class="date-divider">Today</div>`;

      msgs.forEach((m, i) => {
        if (m.typing) {
          html += `
            <div class="typing-indicator">
              <div class="msg-avatar" style="background:${avatarColors[conv.color]}">${conv.initials.charAt(0)}</div>
              <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>`;
          return;
        }

        const mine = m.from === 'me';
        const avatarBg = mine ? 'linear-gradient(135deg,#8B7355,#C9A84C)' : avatarColors[conv.color];
        const avatarInitials = mine ? 'AO' : (m.sender ? m.sender.charAt(0) : conv.initials.charAt(0));

        html += `<div class="msg-row ${mine?'mine':''}" style="animation-delay:${i*0.04}s">`;
        html += `<div class="msg-avatar" style="background:${avatarBg}">${avatarInitials}</div>`;
        html += `<div class="msg-content">`;
        if (!mine && conv.group && m.sender) {
          html += `<div class="msg-sender">${m.sender}</div>`;
        }
        if (m.file) {
          html += `
            <div class="msg-file">
              <div class="file-icon"><i class="bi bi-file-earmark-pdf"></i></div>
              <div class="file-info">
                <div class="file-name">${m.fileName}</div>
                <div class="file-size">${m.fileSize}</div>
              </div>
              <i class="bi bi-download" style="margin-left:.5rem;color:var(--warm-gray);font-size:.85rem;"></i>
            </div>`;
        } else {
          html += `<div class="msg-bubble">${m.text}</div>`;
        }
        html += `<div class="msg-meta">
          <span>${m.time}</span>
          ${mine && m.read ? '<i class="bi bi-check2-all msg-read"></i>' : mine ? '<i class="bi bi-check2"></i>' : ''}
        </div>`;
        html += `</div></div>`;
      });

      area.innerHTML = html;
      area.scrollTop = area.scrollHeight;
    }

    /* ─── Send message ──────────────────────────── */
    function sendMessage() {
      const input = document.getElementById('composeInput');
      const text  = input.value.trim();
      if (!text) return;

      if (!threads[activeConv]) threads[activeConv] = [];

      // Remove typing indicator if present
      threads[activeConv] = threads[activeConv].filter(m => !m.typing);

      const now = new Date();
      const time = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      threads[activeConv].push({ from:'me', text, time, read:false });

      // Update preview
      const conv = conversations.find(c => c.id === activeConv);
      if (conv) conv.preview = text;

      input.value = '';
      input.style.height = 'auto';
      renderThread(activeConv);
      renderConvList();
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('composeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Auto-resize textarea
    document.getElementById('composeInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    /* ─── Filter tabs ──────────────────────────── */
    document.querySelectorAll('.conv-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.conv-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    /* ─── Sidebar ──────────────────────────────── */
    const sidebar     = document.getElementById('sidebar');
    const mainArea    = document.getElementById('mainArea');
    const collapseBtn = document.getElementById('collapseBtn');
    const mobileBtn   = document.getElementById('mobileMenuBtn');
    const overlay     = document.getElementById('sidebarOverlay');

    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      mainArea.classList.toggle('expanded');
    });
    mobileBtn.addEventListener('click', () => sidebar.classList.toggle('mobile-open'));
    overlay.addEventListener('click', () => sidebar.classList.remove('mobile-open'));

    document.querySelectorAll('.nav-item-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.nav-item-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        sidebar.classList.remove('mobile-open');
      });
    });

    /* ─── Init ──────────────────────────────────── */
    renderConvList();
    renderThread(activeConv);
    updateChatHeader(activeConv);
  </script>
</body>
</html>
