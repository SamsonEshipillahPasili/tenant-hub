{% extends '_base.html' %}

{% load static %}

{% block head %}
    {{ block.super }}
    <link href="{% static 'authz/auth.css' %}" rel="stylesheet" />
{% endblock head %}

{% block content %}

    <div class="auth-wrapper">
      <div class="auth-container">
        <div class="form-card">

          <p class="eyebrow">Member Portal</p>
          <h2>Create your<br/>account</h2>

          <!-- Social login -->
          <button class="btn-social mb-2">
            <!-- Google SVG -->
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
          </button>

          <div class="divider">or use email</div>

          <!-- Email -->
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="name@example.com" autocomplete="email"/>
            <label for="email"><i class="bi bi-envelope me-1"></i>Email address</label>
          </div>

          <!-- Password -->
          <div class="pw-wrapper mb-3">
            <div class="form-floating">
              <input type="password" class="form-control" id="password" placeholder="Password" autocomplete="new-password" style="padding-right:3rem;"/>
              <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
            </div>
            <button class="pw-toggle" type="button" aria-label="Toggle password visibility">
              <i class="bi bi-eye pw-icon"></i>
            </button>
          </div>

          <!-- Confirm Password -->
          <div class="pw-wrapper mb-4">
            <div class="form-floating">
              <input type="password" class="form-control" id="confirm_password" placeholder="Confirm Password" autocomplete="new-password" style="padding-right:3rem;"/>
              <label for="confirm_password"><i class="bi bi-shield-lock me-1"></i>Confirm Password</label>
            </div>
            <button class="pw-toggle" type="button" aria-label="Toggle password visibility">
              <i class="bi bi-eye pw-icon"></i>
            </button>
          </div>

          <!-- Submit -->
          <button class="btn-signin" type="button">Create Account &nbsp;<i class="bi bi-person-plus"></i></button>

          <p class="signup-text">
            Already have an account? <a href="{% url 'authz:sign-in' %}" class="link-gold">Sign in</a>
          </p>

        </div>
      </div>
</div>

{% endblock content %}

{% block scripts %}
    {{ block.super }}

    <script>
        // Password visibility toggles
        document.querySelectorAll('.pw-toggle').forEach(btn => {
          btn.addEventListener('click', () => {
            const wrapper = btn.closest('.pw-wrapper');
            const input = wrapper.querySelector('input');
            const icon = btn.querySelector('.pw-icon');
            
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            icon.className = isHidden ? 'bi bi-eye-slash pw-icon' : 'bi bi-eye pw-icon';
          });
        });
  </script>

{% endblock scripts %}
