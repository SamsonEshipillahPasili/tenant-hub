{% extends '_base.html' %}

{% load static %}

{% block head %}
    {{ block.super }}
    <link href="{% static 'authz/auth.css' %}" rel="stylesheet" />
{% endblock head %}

{% block content %}

    <div class="auth-wrapper">
      <div class="auth-container">
        <div class="form-card">

          <p class="eyebrow">Member Portal</p>
          <h2>Reset your<br/>password</h2>
          
          <p class="mb-4 text-secondary" style="font-size: 0.9rem;">
            Enter your email address and we'll send you a link to reset your password.
          </p>

          <!-- Email -->
          <div class="form-floating mb-4">
            <input type="email" class="form-control" id="email" placeholder="name@example.com" autocomplete="email"/>
            <label for="email"><i class="bi bi-envelope me-1"></i>Email address</label>
          </div>

          <!-- Submit -->
          <button class="btn-signin mb-3" type="button">Send Reset Link &nbsp;<i class="bi bi-send"></i></button>

          <p class="signup-text">
            Remembered your password? <a href="{% url 'authz:sign-in' %}" class="link-gold">Back to Sign In</a>
          </p>

        </div>
      </div>
</div>

{% endblock content %}
